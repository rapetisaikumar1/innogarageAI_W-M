appId: com.innogarage.ai
productName: innogarage.ai
icon: resources/icon.png
afterPack: build/afterPack.cjs
afterSign: build/afterPack.cjs
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: msedge-helper
  icon: resources/icon.png
  # Run as current user (no UAC elevation required for audio/screen capture)
  requestedExecutionLevel: asInvoker
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
  createStartMenuShortcut: true
  # Install per-user (no admin rights needed)
  perMachine: false
mac:
  hardenedRuntime: false
  identity: null
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
    - NSScreenCaptureDescription: innogarage.ai needs screen recording to capture system audio and provide real-time AI interview assistance.
  notarize: false
  target:
    - target: dmg
      arch:
        - arm64
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
  title: ${productName}
  icon: resources/icon.png
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
